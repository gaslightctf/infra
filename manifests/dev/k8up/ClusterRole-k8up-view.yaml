apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/instance: k8up
    app.kubernetes.io/name: k8up
    rbac.authorization.k8s.io/aggregate-to-view: "true"
  name: k8up-view
rules:
  - apiGroups:
      - k8up.io
    resources:
      - '*'
    verbs:
      - get
      - list
      - watch
