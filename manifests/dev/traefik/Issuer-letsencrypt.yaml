apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: letsencrypt
  namespace: traefik
spec:
  acme:
    email: acme@gaslightctf.cooking
    privateKeySecretRef:
      name: acme-account-letsencrypt-staging
    profile: tlsserver
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              key: cf-api-token
              name: cf-api-token
        selector:
          dnsZones:
            - gaslightctf.cooking
