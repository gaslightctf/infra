apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
spec:
  destination:
    namespace: kube-system
    server: https://kubernetes.default.svc
  project: default
  source:
    path: ./manifests/dev/cilium
    repoURL: https://github.com/gaslightctf/infra.git
    targetRevision: master
  syncPolicy: {}
