apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: origin-ca-issuer
  namespace: argocd
spec:
  destination:
    namespace: cert-manager
    server: https://kubernetes.default.svc
  project: default
  source:
    path: ./manifests/dev/origin-ca-issuer
    repoURL: https://github.com/gaslightctf/infra.git
    targetRevision: master
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
