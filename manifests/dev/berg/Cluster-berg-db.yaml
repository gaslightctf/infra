apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: berg-db
  namespace: berg
spec:
  bootstrap:
    recovery:
      source: source
  externalClusters:
    - name: source
      plugin:
        isWALArchiver: true
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: r2
  instances: 3
  plugins:
    - isWALArchiver: true
      name: barman-cloud.cloudnative-pg.io
      parameters:
        barmanObjectName: r2
  storage:
    size: 15Gi
