apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: enabled
  name: berg-db
  namespace: berg
spec:
  bootstrap:
    initdb: {}
  instances: 3
  plugins:
    - isWALArchiver: true
      name: barman-cloud.cloudnative-pg.io
      parameters:
        barmanObjectName: r2
        serverName: berg-db
  storage:
    size: 15Gi
