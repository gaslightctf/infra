apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  labels:
    app.kubernetes.io/instance: berg
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: berg
    app.kubernetes.io/version: 5.13.4
    helm.sh/chart: berg-5.13.4
  name: berg-frontend
  namespace: berg
spec:
  hostnames:
    - play-dev.gaslightctf.cooking
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: berg-frontend
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
