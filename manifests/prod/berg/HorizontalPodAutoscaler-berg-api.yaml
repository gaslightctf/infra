apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: berg-api
  namespace: berg
spec:
  maxReplicas: 10
  metrics:
    - resource:
        name: cpu
        target:
          averageUtilization: 70
          type: Utilization
      type: Resource
  minReplicas: 1
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: berg-api
