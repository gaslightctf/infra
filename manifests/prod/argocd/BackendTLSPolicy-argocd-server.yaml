apiVersion: gateway.networking.k8s.io/v1
kind: BackendTLSPolicy
metadata:
  name: argocd-server
  namespace: argocd
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: argocd-server
      sectionName: https
  validation:
    caCertificateRefs:
      - group: ""
        kind: Secret
        name: argocd-server-tls
    hostname: argocd-server.gaslightctf.local
