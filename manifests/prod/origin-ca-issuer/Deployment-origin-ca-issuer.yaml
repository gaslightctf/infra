apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: origin-ca-issuer
    app.kubernetes.io/component: controller
    app.kubernetes.io/instance: origin-ca-issuer
    app.kubernetes.io/name: origin-ca-issuer
  name: origin-ca-issuer
  namespace: cert-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: controller
      app.kubernetes.io/instance: origin-ca-issuer
      app.kubernetes.io/name: origin-ca-issuer
  template:
    metadata:
      labels:
        app: origin-ca-issuer
        app.kubernetes.io/component: controller
        app.kubernetes.io/instance: origin-ca-issuer
        app.kubernetes.io/name: origin-ca-issuer
    spec:
      containers:
        - args:
            - --cluster-resource-namespace=$(POD_NAMESPACE)
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          image: docker.io/cloudflare/origin-ca-issuer:v0.14.0
          imagePullPolicy: Always
          name: origin-ca-issuer
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
            requests:
              cpu: "1"
              memory: 512Mi
      serviceAccountName: origin-ca-issuer
